# alembic.ini — Project Atlas Alembic Configuration
# Run migrations from the project root:
#   alembic upgrade head
#   alembic downgrade -1
#   alembic revision --autogenerate -m "describe change"

[alembic]
# Path to the migration scripts directory
script_location = database/migrations

# Prepend %(here)s to make the path absolute
prepend_sys_path = .

# Template used to generate new migration file names.
# %(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d%(second).2d is the default.
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Truncate slug length in generated file names
truncate_slug_length = 40

# Version locations (single source of truth)
# version_locations = %(here)s/bar/foo/versions %(here)s/bat/foo/versions

# The output encoding used when revision files are written
output_encoding = utf-8

# Connection URL is loaded dynamically from .env via env.py.
# Do NOT set sqlalchemy.url here — that would bypass our settings system.
sqlalchemy.url =


[post_write_hooks]
# Black formatting for generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
